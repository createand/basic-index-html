<html>
<head>
<meta charset="UTF-8">
<title>index.html</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
    }
    .ortala-kutu {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;         /* 🚨 vw yerine %100 yaptık, taşmayı önledik */
        height: 100vh;
        background-color: white;
    }
    .ortala-kutu img {
        max-width: 100%;
        height: auto;
    }
   /* Tablo Şasisi */
   .freebsd-table {
    width: 50%;
    border-collapse: collapse;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 20px 0;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    border-radius: 6px;
    overflow: hidden;
    margin-top: -400px;
}

/* Başlık Takımı (Antrasit Göz) */
.freebsd-table th {
    background-color: #1A1A1A; /* Koyu FreeBSD şasisi */
    color: #FFFFFF;
    text-align: left;
    padding: 14px 16px;
    font-size: 15px;
    letter-spacing: 0.5px;
    border-bottom: 3px solid #D54016; /* Alt fitil Daemon Kırmızısı */
}

/* Satır ve Hücre Ayarları */
.freebsd-table td {
    padding: 12px 16px;
    border-bottom: 1px solid #E0E0E0;
    color: #333333;
    font-size: 14px;
}

/* Çırakların Gözü Dönmesin Diye Satır Geçiş Rengi */
.freebsd-table tr:nth-child(even) {
    background-color: #FAFAFA;
}

/* Fareyle Üstüne Gelince Satırın Yanması (Hover) */
.freebsd-table tr:hover {
    background-color: #F1F1F1;
}

/* İşletim Sistemi İsim Renkleri */
.linux-text {
    color: #E22B22;
    font-weight: bold;
}
.freebsd-text {
    color: #D54016;
    font-weight: bold;
}

/* Link Cıvataları */
.freebsd-table a {
    color: #D54016;
    text-decoration: none;
    font-weight: 600;
    border-bottom: 1px dashed #D54016;
    transition: all 0.2s ease;
}
.freebsd-table a:hover {
    color: #1A1A1A;
    border-bottom: 1px solid #1A1A1A;
}
.tablo-merkez-kutusu {
    display: flex;
    justify-content: center;  /* Yatayda tam ortala */
    align-items: center;      /* Dikeyde tam ortala */
    margin-top: -700px;
    width: 100%;
    height: 100vh;            /* Ekran yüksekliğini sıfıra sıfır eşitle */
    background-color: white; /* Arkaya hafif sanayi grisi, tablo parlasın */
}
</style>
</head>
<body>
    <div class="ortala-kutu">
        <img src="freeBSD.png" alt="FreeBSD Image">
    </div>
    <div class="tablo-merkez-kutusu">
        <table class="freebsd-table">
        <thead>
            <tr>
                <th>İşletim Sistemi</th>
                <th>Resmi Distribütör / Topluluk Kapısı</th>
                <th>Ana Bağlantı Linki</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><span class="linux-text">🐧 Linux</span></td>
                <td>Linux Çirkin Dağıtım ve Kernel Deposu</td>
                <td><a href="https://www.kernel.org" target="_blank">kernel.org</a></td>
            </tr>
            <tr>
                <td><span class="freebsd-text">😈 FreeBSD</span></td>
                <td>FreeBSD Güçlü Dağıtım ve Core Sistem Kapısı</td>
                <td><a href="https://www.freebsd.org" target="_blank">freebsd.org</a></td>
            </tr>
        </tbody>
    </table>
    </div>
</body>
</html>
